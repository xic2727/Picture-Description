name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies 🔧
        run: npm install

      - name: Build Web Application 📦
        run: npm run build

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v5

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print & Show Live Deployment URL 🌐
        run: |
          echo "=========================================================="
          echo "🎉 恭喜！项目构建且发布成功啦！"
          echo "🌐 您的在线体验地址 (GitHub Pages Live URL) 是："
          echo "👉 ${{ steps.deployment.outputs.page_url }}"
          echo "=========================================================="
          
          # 优雅地写入到 GitHub Step Summary 汇总页面中，用户一眼就能看见！
          echo "## 🚀 部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "您的“看图写话乐园”已成功从主分支直接部署上线至 **GitHub Pages**！" >> $GITHUB_STEP_SUMMARY
          echo "👉 **[点击这里，立即打开在线乐园 🎈](${{ steps.deployment.outputs.page_url }})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 提示：项目源自于您的主分支直接构建。请确保您的 GitHub 仓库设置中，**Pages** 的 **Source** 已选择为 **GitHub Actions** 模式。✨" >> $GITHUB_STEP_SUMMARY

